<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - UniAdmission ChatBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .register-container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            border: 1px solid #e5e5e5;
            position: relative;
        }

        .register-header {
            padding: 40px 30px 30px;
            text-align: center;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
        }

        .register-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .register-header p {
            color: #666666;
            font-size: 16px;
            font-weight: 400;
        }

        .register-form {
            padding: 35px 30px;
            background: #ffffff;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #000000;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
            background-color: #ffffff;
            color: #000000;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        }
        
        .form-group input.error {
            border-color: #dc2626;
            box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.1);
        }

        .register-btn {
            width: 100%;
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            font-family: inherit;
        }

        .register-btn:hover {
            background: #333333;
            transform: translateY(-1px);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .register-footer {
            text-align: center;
            padding-bottom: 30px;
            background: #ffffff;
        }

        .register-footer a {
            color: #000000;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .register-footer a:hover {
            color: #666666;
        }

        .error-message {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .register-container {
                margin: 0;
                max-width: none;
                border-radius: 12px;
            }
            
            .register-header {
                padding: 30px 20px 20px;
            }
            
            .register-header h1 {
                font-size: 24px;
            }
            
            .register-form {
                padding: 25px 20px;
            }
            
            .form-group {
                margin-bottom: 20px;
            }
            
            .form-group input {
                padding: 12px 14px;
                font-size: 16px;
            }
            
            .register-btn {
                padding: 14px;
                font-size: 16px;
            }
        }
            
            .register-form {
                padding: 20px;
            }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>UniAdmission</h1>
            <p>Tạo tài khoản mới</p>
        </div>
        
        <form class="register-form" method="POST" id="register-form">
            {% if get_flashed_messages() %}
                <div class="error-message">
                    {% for message in get_flashed_messages() %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
            
            <div id="error-message" class="error-message" style="display: none;"></div>
            
            <div class="form-group">
                <label for="full_name">Họ và tên</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>
            
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Xác nhận mật khẩu</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            
            <button type="submit" class="register-btn" id="register-btn">
                Đăng ký
            </button>
            
            <div class="register-footer">
                <p>Đã có tài khoản? <a href="{{ url_for('login') }}">Đăng nhập</a></p>
            </div>
        </form>
    </div>

    <script>
        // Auto focus on full name field
        document.getElementById('full_name').focus();
        
        // Password validation function
        function validatePasswords() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('error-message');
            const confirmPasswordInput = document.getElementById('confirm_password');
            
            if (password !== confirmPassword && confirmPassword.length > 0) {
                errorDiv.textContent = 'Mật khẩu xác nhận không khớp';
                errorDiv.style.display = 'block';
                confirmPasswordInput.classList.add('error');
                return false;
            } else {
                errorDiv.style.display = 'none';
                confirmPasswordInput.classList.remove('error');
                return true;
            }
        }
        
        // Real-time validation on confirm password input
        document.getElementById('confirm_password').addEventListener('input', function() {
            validatePasswords();
        });
        
        // Also validate when password changes
        document.getElementById('password').addEventListener('input', function() {
            const confirmPassword = document.getElementById('confirm_password');
            if (confirmPassword.value.length > 0) {
                validatePasswords();
            }
        });
        
        // Form submission validation
        document.getElementById('register-form').addEventListener('submit', function(e) {
            // Clear previous errors
            document.getElementById('error-message').style.display = 'none';
            
            // Validate passwords
            if (!validatePasswords()) {
                e.preventDefault(); // Prevent form submission
                return false;
            }
            
            // If validation passes, form will submit normally
            return true;
        });
    </script>
</body>
</html>
