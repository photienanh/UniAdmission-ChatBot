<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - UniAdmission ChatBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            cursor: default !important;
        }

        /* Only allow text cursor on actual text inputs */
        input[type="text"], 
        input[type="password"], 
        input[type="email"], 
        textarea {
            cursor: text !important;
        }

        /* Buttons and clickable elements should have pointer */
        button, 
        a, 
        .clickable,
        [onclick],
        .login-btn,
        .password-toggle,
        button *,
        a *,
        .clickable *,
        [onclick] *,
        .login-btn *,
        .password-toggle * {
            cursor: pointer !important;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .login-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            border: 1px solid #e5e5e5;
            position: relative;
            transform: translateY(-20px);
        }

        .login-header {
            padding: 40px 30px 30px;
            text-align: center;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #666666;
            font-size: 16px;
            font-weight: 400;
        }

        .login-form {
            padding: 35px 30px;
            background: #ffffff;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #000000;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .form-group {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s ease;
            background-color: #ffffff;
            color: #000000;
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: calc(50% + 17px);
            transform: translateY(-50%);
            cursor: pointer;
            color: #666666;
            font-size: 18px;
            transition: all 0.2s ease;
            z-index: 10;
            padding: 4px;
            pointer-events: auto;
            user-select: none;
        }

        .password-toggle:hover {
            color: #000000;
            transform: translateY(-50%) scale(1.1);
        }

        .password-toggle:active {
            transform: translateY(-50%) scale(0.95);
        }

        .form-group.password-field {
            margin-bottom: 24px;
        }

        .form-group.password-field input {
            padding-right: 50px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        .login-btn {
            width: 100%;
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 25px;
        }

        .login-btn:hover {
            background: #333333;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0px);
        }

        .login-footer {
            text-align: center;
            padding-bottom: 35px;
            background: #ffffff;
        }

        .login-footer p {
            color: #666666;
            font-size: 15px;
        }

        .login-footer a {
            color: #000000;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .login-footer a:hover {
            color: #666666;
        }

        .error-message {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            font-size: 14px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 10px;
                max-width: none;
            }
            
            .login-header {
                padding: 30px 20px 20px;
            }
            
            .login-form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>UniAdmission</h1>
            <p>Đăng nhập để tiếp tục</p>
        </div>
        
        <form class="login-form" id="login-form" method="POST">
            {% if get_flashed_messages() %}
                <div class="error-message" style="display: block;">
                    {% for message in get_flashed_messages() %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
            
            <div id="error-message" class="error-message"></div>
            
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group password-field">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required>
                <i class="fas fa-eye password-toggle" id="password-toggle"></i>
            </div>
            
            <button type="submit" class="login-btn">
                Đăng nhập
            </button>
            
            <div class="login-footer">
                <p>Chưa có tài khoản? <a href="{{ url_for('register') }}">Đăng ký</a></p>
            </div>
        </form>
    </div>

    <script>
        // Function to toggle password visibility
        function togglePassword(event, inputId, toggleIcon) {
            // Prevent the input from getting focus when clicking the icon
            event.preventDefault();
            event.stopPropagation();
            
            const passwordInput = document.getElementById(inputId);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Setup event listener for password toggle
        document.addEventListener('DOMContentLoaded', function() {
            // Prevent unwanted focus behavior
            document.addEventListener('mousedown', function(e) {
                // Only allow focus on inputs, textareas, and buttons
                if (!e.target.matches('input, textarea, button, a, select')) {
                    e.preventDefault();
                }
            });

            const passwordToggle = document.getElementById('password-toggle');
            const passwordInput = document.getElementById('password');
            
            passwordToggle.addEventListener('mousedown', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    passwordToggle.classList.remove('fa-eye');
                    passwordToggle.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    passwordToggle.classList.remove('fa-eye-slash');
                    passwordToggle.classList.add('fa-eye');
                }
            });
            
            // Prevent click event from bubbling to input
            passwordToggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
            });
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            // Hide previous errors
            errorDiv.style.display = 'none';
            
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            })
            .catch(error => {
                errorDiv.textContent = 'Đã xảy ra lỗi. Vui lòng thử lại.';
                errorDiv.style.display = 'block';
            });
        });

        // Auto focus on username field
        document.getElementById('username').focus();
    </script>
</body>
</html>
