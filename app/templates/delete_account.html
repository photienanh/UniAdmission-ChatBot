<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xóa tài khoản - UniAdmission ChatBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: default !important;
        }

        /* Cursor controls for clickable elements */
        button,
        a,
        input[type="submit"],
        input[type="button"],
        .cancel-btn,
        .delete-btn,
        button *,
        a *,
        .cancel-btn *,
        .delete-btn * {
            cursor: pointer !important;
        }

        input,
        textarea {
            cursor: text !important;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .delete-container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 480px;
            border: 1px solid #e5e5e5;
            position: relative;
        }

        .delete-header {
            padding: 40px 30px 30px;
            text-align: center;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
        }

        .delete-header .warning-icon {
            font-size: 48px;
            color: #dc2626;
            margin-bottom: 16px;
        }

        .delete-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #dc2626;
            margin-bottom: 12px;
        }

        .delete-header p {
            color: #666666;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
        }

        .delete-form {
            padding: 35px 30px;
            background: #ffffff;
        }

        .warning-box {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .warning-box h3 {
            color: #dc2626;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .warning-box ul {
            color: #b91c1c;
            font-size: 14px;
            margin-left: 20px;
        }

        .warning-box li {
            margin-bottom: 4px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #000000;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
            background-color: #ffffff;
            color: #000000;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.1);
        }

        .form-group input.error {
            border-color: #dc2626;
            box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.1);
        }

        .confirm-text {
            background-color: #f9fafb;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 14px;
            color: #374151;
            margin-bottom: 16px;
            text-align: center;
        }

        .delete-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .cancel-btn {
            flex: 1;
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cancel-btn:hover {
            background: #e5e7eb;
            border-color: #9ca3af;
        }

        .delete-btn {
            flex: 1;
            background: #dc2626;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            opacity: 0.5;
            pointer-events: none;
        }

        .delete-btn.enabled {
            opacity: 1;
            pointer-events: auto;
        }

        .delete-btn.enabled:hover {
            background: #b91c1c;
            transform: translateY(-1px);
        }

        .delete-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background-color: #d1fae5;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #059669;
            font-size: 14px;
            display: none;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .delete-container {
                margin: 0;
                max-width: none;
                border-radius: 12px;
            }
            
            .delete-header {
                padding: 30px 20px 20px;
            }
            
            .delete-header h1 {
                font-size: 20px;
            }
            
            .delete-form {
                padding: 25px 20px;
            }
            
            .form-group {
                margin-bottom: 20px;
            }
            
            .form-group input {
                padding: 12px 14px;
                font-size: 16px;
            }
            
            .delete-actions {
                flex-direction: column;
            }
            
            .cancel-btn, .delete-btn {
                padding: 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="delete-container">
        <div class="delete-header">
            <div class="warning-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1>Xóa tài khoản</h1>
            <p>Bạn có chắc chắn muốn xóa tài khoản vĩnh viễn?</p>
        </div>
        
        <form class="delete-form" id="delete-form">
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>
            
            <div class="warning-box">
                <h3>Cảnh báo quan trọng:</h3>
                <ul>
                    <li>Tất cả dữ liệu của bạn sẽ bị xóa vĩnh viễn</li>
                    <li>Lịch sử trò chuyện sẽ không thể khôi phục</li>
                    <li>Hành động này không thể hoàn tác</li>
                    <li>Bạn sẽ cần tạo tài khoản mới để sử dụng lại dịch vụ</li>
                </ul>
            </div>
            
            <div class="form-group">
                <label for="confirm_text">Để xác nhận, vui lòng nhập chính xác:</label>
                <div class="confirm-text">DELETE</div>
                <input type="text" id="confirm_text" name="confirm_text" placeholder="Nhập DELETE để xác nhận" required>
            </div>
            
            <div class="form-group">
                <label for="password">Nhập mật khẩu để xác nhận:</label>
                <input type="password" id="password" name="password" placeholder="Mật khẩu của bạn" required>
            </div>
            
            <div class="delete-actions">
                <a href="{{ url_for('home') }}" class="cancel-btn">
                    <i class="fas fa-arrow-left" style="margin-right: 8px;"></i>
                    Hủy bỏ
                </a>
                <button type="submit" class="delete-btn" id="delete-btn">
                    <i class="fas fa-trash" style="margin-right: 8px;"></i>
                    Xóa tài khoản
                </button>
            </div>
        </form>
    </div>

    <script>
        // Prevent unwanted focus behavior
        document.addEventListener('mousedown', function(e) {
            // Only allow focus on inputs, textareas, and buttons
            if (!e.target.matches('input, textarea, button, a, select')) {
                e.preventDefault();
            }
        });

        const confirmInput = document.getElementById('confirm_text');
        const passwordInput = document.getElementById('password');
        const deleteBtn = document.getElementById('delete-btn');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');

        // Enable/disable delete button based on confirmation
        function checkForm() {
            const confirmValue = confirmInput.value.trim();
            const passwordValue = passwordInput.value.trim();
            
            if (confirmValue === 'DELETE' && passwordValue.length > 0) {
                deleteBtn.classList.add('enabled');
            } else {
                deleteBtn.classList.remove('enabled');
            }
        }

        confirmInput.addEventListener('input', checkForm);
        passwordInput.addEventListener('input', checkForm);

        // Handle form submission
        document.getElementById('delete-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Clear previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            const confirmValue = confirmInput.value.trim();
            const passwordValue = passwordInput.value.trim();
            
            if (confirmValue !== 'DELETE') {
                errorDiv.textContent = 'Vui lòng nhập chính xác "DELETE" để xác nhận';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (passwordValue.length === 0) {
                errorDiv.textContent = 'Vui lòng nhập mật khẩu';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Disable button during request
            deleteBtn.disabled = true;
            deleteBtn.textContent = 'Đang xóa...';
            
            // Send request
            fetch('/delete_account', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    confirm: confirmValue,
                    password: passwordValue
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    successDiv.textContent = data.message;
                    successDiv.style.display = 'block';
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            })
            .catch(error => {
                errorDiv.textContent = 'Có lỗi xảy ra. Vui lòng thử lại.';
                errorDiv.style.display = 'block';
            })
            .finally(() => {
                // Re-enable button
                deleteBtn.disabled = false;
                deleteBtn.innerHTML = '<i class="fas fa-trash" style="margin-right: 8px;"></i>Xóa tài khoản';
            });
        });
    </script>
</body>
</html>
