<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Uniadmission Chatbot</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='register.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>Uniadmission Chatbot</h1>
            <p>Tạo tài khoản mới</p>
        </div>
        
        <form class="register-form" id="register-form">
            {% if get_flashed_messages() %}
                <div class="error-message">
                    {% for message in get_flashed_messages() %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
            
            <div id="error-message" class="error-message" style="display: none;"></div>
            
            <div class="form-group">
                <label for="full_name">Họ và tên</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>
            
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group password-field">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required>
                <i class="fas fa-eye password-toggle" id="password-toggle"></i>
            </div>
            
            <div class="form-group password-field">
                <label for="confirm_password">Xác nhận mật khẩu</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
                <i class="fas fa-eye password-toggle" id="confirm-password-toggle"></i>
            </div>
            
            <button type="submit" class="register-btn" id="register-btn">
                Đăng ký
            </button>
            
            <div class="register-footer">
                <p>Đã có tài khoản? <a href="{{ url_for('login') }}">Đăng nhập</a></p>
            </div>
        </form>
    </div>
    <script src="{{ url_for('static', path='register.js') }}"></script>
</body>
</html>
