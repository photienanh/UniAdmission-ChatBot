<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xóa tài khoản - Chatbot đại học</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='delete_account.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="delete-container">
        <div class="delete-header">
            <div class="warning-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1>Xóa tài khoản</h1>
            <p>Bạn có chắc chắn muốn xóa tài khoản vĩnh viễn?</p>
        </div>
        
        <form class="delete-form" id="delete-form">
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>
            
            <div class="warning-box">
                <h3>Cảnh báo quan trọng:</h3>
                <ul>
                    <li>Tất cả dữ liệu của bạn sẽ bị xóa vĩnh viễn</li>
                    <li>Lịch sử trò chuyện sẽ không thể khôi phục</li>
                    <li>Hành động này không thể hoàn tác</li>
                    <li>Bạn sẽ cần tạo tài khoản mới để sử dụng lại dịch vụ</li>
                </ul>
            </div>
            
            <div class="form-group">
                <label for="confirm_text">Để xác nhận, vui lòng nhập chính xác:</label>
                <div class="confirm-text">DELETE</div>
                <input type="text" id="confirm_text" name="confirm_text" placeholder="Nhập DELETE để xác nhận" required>
            </div>
            
            <div class="form-group">
                <label for="password">Nhập mật khẩu để xác nhận:</label>
                <input type="password" id="password" name="password" placeholder="Mật khẩu của bạn" required>
            </div>
            
            <div class="delete-actions">
                <a href="{{ url_for('index') }}" class="cancel-btn">
                    <i class="fas fa-arrow-left" style="margin-right: 8px;"></i>
                    Hủy bỏ
                </a>
                <button type="submit" class="delete-btn" id="delete-btn">
                    <i class="fas fa-trash" style="margin-right: 8px;"></i>
                    Xóa tài khoản
                </button>
            </div>
        </form>
    </div>
    <script src="{{ url_for('static', path='delete_account.js') }}"></script>
</body>
</html>
